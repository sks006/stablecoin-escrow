[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
anchor_escrow = "B5KMPtmn3yB2P7sqmDjQXvrFYcDfbi7U5L6DsCKgqF6u"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 10000

[scripts]
test = "NODE_OPTIONS='--no-experimental-strip-types' yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
